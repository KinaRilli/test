<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днём Рождения!</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Montserrat:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --magenta: #f035e0;
    --magenta-hover: #d020c0;
    --text-dark: #333;
    --text-light: #666;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }

  .screen {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.6s ease; overflow: hidden;
    background: white;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ФОНЫ */
  .bg-light {
    position: absolute; inset: 0; z-index: -5;
    background: url('https://gcdnb.pbrd.co/images/nb4Rw683nyTY.png?o=1') center/cover no-repeat;
  }
  .bg-room {
    position: absolute; inset: 0; z-index: -2;
    background: url('https://gcdnb.pbrd.co/images/EKRHDiaBaFiN.png?o=1') center/cover no-repeat;
  }
  .bg-room::after {
    content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.3);
  }

  /* АНИМАЦИЯ ПЕРЕЛИВА */
  @keyframes colorShift {
    0% { filter: hue-rotate(0deg) brightness(1); }
    50% { filter: hue-rotate(90deg) brightness(1.2); transform: scale(1.05); }
    100% { filter: hue-rotate(0deg) brightness(1); }
  }

  /* СТИЛИ КОРОБОК */
  .boxes-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
  .box-btn { background: none; border: none; cursor: pointer; outline: none; transition: transform 0.2s; }
  .box-btn img { 
    width: 100px; height: auto; display: block; 
    animation: colorShift 4s infinite ease-in-out; /* Применяем перелив */
  }
  .box-btn:hover { transform: translateY(-10px); }

  /* СООБЩЕНИЕ "ПУСТО" */
  .game-msg {
    position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
    background: white; padding: 15px 30px; border-radius: 50px;
    color: var(--magenta); font-weight: 700; font-size: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: none; z-index: 1000; border: 2px solid var(--magenta);
  }

  /* ОСТАЛЬНЫЕ СТИЛИ (Лендинг, Карточка, Модалки) */
  .landing-layout { display: flex; width: 100%; max-width: 900px; justify-content: space-around; align-items: center; padding: 20px; }
  .landing-text { text-align: center; color: #8e6d51; }
  .hb-birthday { font-family: 'Dancing Script', cursive; font-size: clamp(60px, 8vw, 110px); color: #a47b59; }
  .env-float { cursor: pointer; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  .bday-card {
    width: clamp(280px, 40vw, 400px); background: #fff; border-radius: 16px; 
    text-align: center; padding: 30px 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  }
  
  .modal {
    background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 40px; 
    text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }

  .btn {
    background: var(--magenta); color: #fff; border: none; border-radius: 50px; 
    padding: 15px 40px; font-weight: 600; cursor: pointer; margin-top: 20px;
  }

  .hearts-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .heart { width: 30px; height: 30px; fill: red; }
  .heart.lost { fill: #ccc; opacity: 0.5; }

  .win-modal {
    display: flex; max-width: 800px; width: 95%; background: #fff; border-radius: 24px;
    overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  }
  .win-note-side { flex: 1.2; padding: 40px; background: #fffaf0; border-right: 1px solid #eee; font-family: 'Caveat'; font-size: 22px; }
  .win-prize-side { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .prize-image { max-width: 180px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

  @media (max-width: 768px) { .win-modal { flex-direction: column; } }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="screen active" id="s1">
  <div class="bg-light"></div>
  <div class="landing-layout">
    <div class="landing-text">
      <span class="hb-birthday">Birthday</span>
    </div>
    <div class="env-float" onclick="goTo(2)">
      <img src="https://gcdnb.pbrd.co/images/Sbh350mn2wrW.png?o=1" style="width: 250px;">
    </div>
  </div>
</div>

<div class="screen" id="s2">
  <div class="bg-light"></div>
  <div class="landing-layout">
    <div class="env-float">
      <svg width="300" viewBox="0 0 320 288" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="54" y="8" width="212" height="158" rx="10" fill="white" stroke="#e8d0e0"/>
        <text x="160" y="80" text-anchor="middle" font-family="Dancing Script" font-size="20" fill="#9b7dc7">С Днём Рождения!</text>
        <rect x="8" y="104" width="304" height="174" rx="13" fill="#f8f2fe" stroke="#d0b8e8"/>
        <polygon points="8,104 160,6 312,104" fill="#dcc0e8"/>
      </svg>
    </div>
  </div>
</div>

<div class="screen" id="s3">
  <div class="bg-light"></div>
  <div class="bday-card">
    <div style="font-family: 'Dancing Script'; font-size: 30px; color: var(--magenta);">Поздравляю!</div>
    <p style="margin: 20px 0; font-family: 'Caveat'; font-size: 20px;">Нажми на кнопку ниже, чтобы забрать свой подарок!</p>
    <button class="btn" onclick="goTo(4)">Получить подарок</button>
  </div>
</div>

<div class="screen" id="s4">
  <div class="bg-room"></div>
  <div class="modal">
    <h2>Мини-игра</h2>
    <p>У тебя 3 попытки, чтобы найти подарок в коробках!</p>
    <button class="btn" onclick="startGame()">Начать</button>
  </div>
</div>

<div class="screen" id="s5">
  <div class="bg-room"></div>
  <div id="gameMsg" class="game-msg">Тут пусто! 🎁</div>
  
  <div class="modal">
    <div class="hearts-container">
      <svg class="heart" id="h1" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="heart" id="h2" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="heart" id="h3" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    
    <div class="boxes-container">
      <button class="box-btn" onclick="pickBox(this)"><img src="https://gcdnb.pbrd.co/images/uDPqNncqycjf.png?o=1"></button>
      <button class="box-btn" onclick="pickBox(this)"><img src="https://gcdnb.pbrd.co/images/1M2VG2b4Y8pi.png?o=1"></button>
      <button class="box-btn" onclick="pickBox(this)"><img src="https://gcdnb.pbrd.co/images/SrNkRig2rOMl.png?o=1"></button>
    </div>
  </div>
</div>

<div class="screen" id="s6">
  <div class="bg-room"></div>
  <div class="win-modal">
    <div class="win-note-side">
      <p>Ура! Ты нашла подарок!</p><br>
      <p>Я подстроил игру так, чтобы ты обязательно победила. С днём рождения! 🎂</p>
    </div>
    <div class="win-prize-side">
      <h3>Твой подарок:</h3>
      <img src="https://gcdnb.pbrd.co/images/KzG9YAeU9cTu.png?o=1" class="prize-image">
    </div>
  </div>
</div>

<script>
  function goTo(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('s' + screenId);
    if(target) target.classList.add('active');
    
    if (screenId === 2) setTimeout(() => goTo(3), 1500);
  }

  let lives = 3;

  function startGame() {
    lives = 3;
    document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
    goTo(5);
  }

  function pickBox(btn) {
    if (lives > 1) {
      // Показываем сообщение
      const msg = document.getElementById('gameMsg');
      if(msg) {
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 1000);
      }

      // Отнимаем жизнь
      const heart = document.getElementById('h' + lives);
      if(heart) heart.classList.add('lost');
      lives--;

      // Эффект тряски
      btn.style.transform = 'translateX(5px)';
      setTimeout(() => { btn.style.transform = 'translateX(-5px)'; }, 50);
      setTimeout(() => { btn.style.transform = 'translateX(0)'; }, 100);
    } else {
      // ПОБЕДА
      goTo(6);
      fireConfetti();
    }
  }

  function fireConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pieces = [];
    for (let i = 0; i < 100; i++) {
      pieces.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
        v: Math.random() * 3 + 2, color: '#f035e0'
      });
    }
    function update() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      pieces.forEach(p => {
        p.y += p.v;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 5, 5);
      });
      requestAnimationFrame(update);
    }
    update();
  }
</script>

</body>
</html>
