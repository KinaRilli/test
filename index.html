<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Рождения!</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Montserrat:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="confetti"></canvas>

<div class="screen active" id="s1">
  <div class="bg-light"></div>
  <div class="landing-layout">
    <div class="landing-text">
      <span class="hb-birthday">Birthday</span>
    </div>
    <div class="env-float" onclick="goTo(2)">
      <img src="https://gcdnb.pbrd.co/images/Sbh350mn2wrW.png?o=1" style="width: 250px;">
    </div>
  </div>
</div>

<script>
  // Здесь остается только JavaScript (функции goTo, pickBox, fireConfetti)
  // Не переноси их в CSS файл, они работают только здесь или в .js файле
  function goTo(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('s' + screenId);
    if(target) target.classList.add('active');
    if (screenId === 2) setTimeout(() => goTo(3), 1500);
  }

  let lives = 3;
  function startGame() {
    lives = 3;
    document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
    goTo(5);
  }

  function pickBox(btn) {
    if (lives > 1) {
      const msg = document.getElementById('gameMsg');
      if(msg) {
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 1000);
      }
      const heart = document.getElementById('h' + lives);
      if(heart) heart.classList.add('lost');
      lives--;
      btn.style.transform = 'translateX(5px)';
      setTimeout(() => { btn.style.transform = 'translateX(-5px)'; }, 50);
      setTimeout(() => { btn.style.transform = 'translateX(0)'; }, 100);
    } else {
      goTo(6);
      fireConfetti();
    }
  }

  function fireConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pieces = [];
    for (let i = 0; i < 100; i++) {
      pieces.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
        v: Math.random() * 3 + 2, color: '#f035e0'
      });
    }
    function update() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      pieces.forEach(p => {
        p.y += p.v;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 5, 5);
      });
      requestAnimationFrame(update);
    }
    update();
  }
</script>

</body>
</html>
